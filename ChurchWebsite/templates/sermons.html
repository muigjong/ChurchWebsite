<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>설교 및 영상 - 희망찬교회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .video-container {
            margin-bottom: 30px;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
        }
        /* 쇼츠 영상 등을 고려한 비율 유지 */
        .ratio-sermon {
            aspect-ratio: 16 / 9;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">희망찬교회</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/intro">교회소개</a>
                <a class="nav-link active" href="/sermons">설교말씀</a>
                <a class="nav-link" href="/">홈으로</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="fw-bold mb-5 text-center">말씀과 영상</h2>

        <div class="row g-4">
            {% for video_id in videos %}
            <div class="col-md-6 video-container">
                <div class="card shadow-sm border-0">
                    <div class="ratio ratio-16x9">
                        <iframe src="https://www.youtube.com/embed/{{ video_id }}"
                                title="YouTube video player"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                allowfullscreen></iframe>
                    </div>
                    <div class="card-body bg-white">
                        <p class="text-primary mb-1" style="font-size: 0.8rem;">희망찬교회 콘텐츠</p>
                        <h5 class="card-title fw-bold">신앙을 세우는 귀한 말씀</h5>
                    </div>
                </div>

                <div class="card-body bg-white text-center">
                          <a href="https://www.youtube.com/watch?v={{ video_id }}" target="_blank" class="btn btn-outline-danger btn-sm">
                        ❤️ 유튜브에서 좋아요 누르기
                    </a>
                </div>

            </div>
            {% endfor %}
        </div>


        <nav class="mt-5">
            <ul class="pagination justify-content-center">
                <li class="page-item {% if page == 1 %}disabled{% endif %}">
                    <a class="page-link" href="/sermons/{{ page - 1 }}">이전</a>
                </li>
                {% for p in range(1, total_pages + 1) %}
                <li class="page-item {% if p == page %}active{% endif %}">
                    <a class="page-link" href="/sermons/{{ p }}">{{ p }}</a>
                </li>
                {% endfor %}
                <li class="page-item {% if page == total_pages %}disabled{% endif %}">
                    <a class="page-link" href="/sermons/{{ page + 1 }}">다음</a>
                </li>
            </ul>
        </nav>
    </div>

</body>
</html>
