<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공지사항 - 희망찬하나샘교회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 이미지를 클릭할 수 있다는 표시를 주기 위해 커서 변경 */
        .card-img-top {
            cursor: pointer;
            transition: opacity 0.2s;
        }

            .card-img-top:hover {
                opacity: 0.8; /* 마우스 올렸을 때 살짝 흐려지게 효과 */
            }
    </style>
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="fw-bold mb-4 text-center">공지사항</h2>

        {% if not notices %}
        <p class="text-center text-muted">등록된 공지사항이 없습니다.</p>
        {% else %}
        <div class="row">
            {% for n in notices %}
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100 shadow-sm">
                    {% if n.image %}
                    <img src="{{ url_for('static', filename='uploads/' + n.image) }}"
                         class="card-img-top"
                         style="height: 200px; object-fit: cover;"
                         data-bs-toggle="modal"
                         data-bs-target="#noticeModal{{ n.id }}">
                    {% endif %}

                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ n.title }}</h5>
                        <p class="card-text text-truncate">{{ n.content }}</p>
                    </div>

                    <div class="card-footer bg-white border-0">
                        <button type="button" class="btn btn-outline-primary btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#noticeModal{{ n.id }}">
                            자세히 보기
                        </button>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="noticeModal{{ n.id }}" tabindex="-1" aria-labelledby="modalLabel{{ n.id }}" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold" id="modalLabel{{ n.id }}">{{ n.title }}</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            {% if n.image %}
                            <img src="{{ url_for('static', filename='uploads/' + n.image) }}" class="img-fluid rounded mb-3 w-100">
                            {% endif %}
                            <div class="p-2" style="white-space: pre-wrap; line-height: 1.6;">{{ n.content }}</div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
