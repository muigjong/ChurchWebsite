<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인 - 희망찬교회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-4" style="width: 350px;">
            <h3 class="text-center fw-bold mb-4">관리자 로그인</h3>
            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" name="user_id" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="user_pw" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
                <a href="/" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">홈으로 돌아가기</a>
            </form>
        </div>
    </div>
</body>
</html>
