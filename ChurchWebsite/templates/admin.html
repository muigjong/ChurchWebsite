<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지 - 희망찬교회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">교회 관리자 페이지</h2>
            <a href="/" class="btn btn-outline-secondary">홈으로</a>
        </div>

        <div class="card shadow-sm p-4 mb-5">
            <h5 class="fw-bold mb-3">새 설교 영상 추가</h5>
            <form method="post" class="row g-3">
                <div class="col-md-10">
                    <input type="text" name="video_url" class="form-control" placeholder="유튜브 주소를 입력하세요 (예: https://youtu.be/...)" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">영상 등록</button>
                </div>
            </form>
        </div>

        <h5 class="fw-bold mb-3">현재 등록된 영상 목록</h5>
        <div class="row row-cols-1 row-cols-md-3 g-3">
            {% for video_id in videos %}
            <div class="col">
                <div class="card h-100">
                    <img src="https://img.youtube.com/vi/{{ video_id }}/mqdefault.jpg" class="card-img-top">
                    <div class="card-body">
                        <p class="card-text small text-muted">ID: {{ video_id }}</p>
                        <a href="/delete_video/{{ video_id }}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Are you sure you want to delete this video?')">Delete</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="card shadow-sm p-4 mb-5">
            <h5 class="fw-bold mb-3">교회 소개 수정 (Edit Introduction)</h5>
            <form method="post">
                <div class="mb-3">
                    <textarea name="church_intro" class="form-control" rows="5" required>{{ intro_text }}</textarea>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-success">Update Introduction</button>
                </div>
            </form>
        </div>

        <div class="card p-4 mb-4">
            <h5>공지사항 등록</h5>
            <form method="post" enctype="multipart/form-data">
                <input type="text" name="notice_title" class="form-control mb-2" placeholder="제목" required>
                <textarea name="notice_content" class="form-control mb-2" placeholder="내용" required></textarea>
                <input type="file" name="notice_image" class="form-control mb-2">
                <button type="submit" class="btn btn-primary">공지사항 올리기</button>
            </form>
        </div>

        <h5>등록된 공지사항 관리</h5>
        <ul class="list-group">
            {% for n in notices %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ n.title }}
                <a href="/delete_notice/{{ n.id }}" class="btn btn-sm btn-danger" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
            </li>
            {% endfor %}
        </ul>

    </div>
</body>
</html>
